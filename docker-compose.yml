services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit
      POSTGRES_DB: credit
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://credit:credit@db:5432/credit
    depends_on:
      - db
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      DATABASE_URL: postgresql+psycopg2://credit:credit@db:5432/credit
    depends_on:
      - db
    ports:
      - "8501:8501"

volumes:
  pgdata:
